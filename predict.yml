name: Daily Petrol Price Prediction

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run prediction script
        run: python predict.py

      - name: Commit and push prediction.json
        run: |
          git config user.name  "tanknu-bot"
          git config user.email "bot@vandaagtanken.nl"
          git add prediction.json
          git diff --staged --quiet || git commit -m "chore: daily price prediction $(date -u +%Y-%m-%d)"
          git push
