name: Daily Petrol Price Prediction

on:
  schedule:
    # Run every day at 07:00 UTC (09:00 NL time) — after ECB publishes daily EUR/USD
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to push prediction.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run prediction script
        run: python predict.py

      - name: Commit and push prediction.json
        run: |
          git config user.name  "tanknu-bot"
          git config user.email "bot@tanknu.nl"
          git add prediction.json
          git diff --staged --quiet || git commit -m "chore: daily price prediction $(date -u +%Y-%m-%d)"
          git push
